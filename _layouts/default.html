<!DOCTYPE html>
<html lang="en">

  {% include head.html %}

  <body>
    <nav class="nav-main">
      <!-- Desktop: 3-column layout so logo is always exactly centered -->
      <div class="nav-pc">
        <div class="nav-group">
          <a class="hvr-underline-reveal" href="{{ site.baseurl }}/about/">about me</a>
        </div>
        <a class="nav-logo" href="{{ site.baseurl }}/"><img src="{{ site.baseurl }}/images/LOGO_WB_Sq.png" alt="Home"></a>
        <div class="nav-group">
          <a class="hvr-underline-reveal" href="{{ site.baseurl }}/research/">research</a>
          <a class="hvr-underline-reveal" href="{{ site.baseurl }}/blog/">blog</a>
        </div>
      </div>

      <!-- Mobile -->
      <ul class="nav-primary">
        <li class="logo"><a href="{{ site.baseurl }}/"><img src="{{ site.baseurl }}/images/LOGO_WB_Sq.png" alt="Home"></a></li>
        <li class="menu-toggle" onclick="toggleMenu()">☰</li>
      </ul>

      <ul class="nav-secondary" id="menu">
        <li class="hvr-underline-reveal"><a href="{{ site.baseurl }}/about/">about me</a></li>
        <li class="hvr-underline-reveal"><a href="{{ site.baseurl }}/research/">research</a></li>
        <li class="hvr-underline-reveal"><a href="{{ site.baseurl }}/blog/">blog</a></li>
      </ul>
    </nav>

    <div class="container content">
      <main>
        {{ content }}
      </main>

      <footer class="footer">
        <div class="footer-row">
          <div class="footer-brand">
            <div class="footer-logo-wrap">
              <img src="{{ site.baseurl }}/images/LOGO_WB_Sq.png" alt="MK">
            </div>
            <small>
              <span class="copyright"><i class="fa-regular fa-copyright"></i> 2024-<time datetime="{{ site.time | date_to_xmlschema }}">{{ site.time | date: '%Y' }}</time> {{ site.author.name }}</span> &middot;
              <span>Powered by <a href="http://jekyllrb.com/">Jekyll</a> and <a href="https://www.netlify.com/">Netlify</a></span>
              <span><br><a href="mailto:minjaekwen@gmail.com">minjaekwen@gmail.com</a></span>
            </small>
          </div>
          <div class="ftr-links">
            <a href="/files/MinjaeKwen_CV.pdf"><i class="fa-solid fa-file"></i></a>
            <a href="mailto:minjaekwen@gmail.com"><i class="fa-solid fa-envelope"></i></a>
            <a href="https://instagram.com/minjaekwen/"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://scholar.google.com/citations?user=XYK4AgQAAAAJ"><i class="fa-brands fa-google-scholar"></i></a>
            <a href="https://www.linkedin.com/in/minjaekwen"><i class="fa-brands fa-linkedin"></i></a>
          </div>
        </div>
      </footer>
    </div>

    <script>
      function toggleMenu() {
        var menu = document.getElementById("menu");
        menu.classList.toggle("active");
      }
    </script>

  </body>
</html>
